[DEFAULT]

# Verbosity level for TermuxDocker messages
verbose_level = 3

# Top directory for TermuxDocker data
topdir = %(topdir)s/

# Temporary working directory
tmpdir = /tmp

# Default execution mode (matches execmodes: P1, P2, F1-F4, R1-R3)
default_execution_mode = P1

# Docker registry URLs
dockerio_index_url = https://hub.docker.com
dockerio_registry_url = https://registry-1.docker.io

# Storage paths for TermuxDocker
keystore = keystore
layersdir = %(topdir)s/layers
containersdir = %(topdir)s/containers
reposdir = %(topdir)s/repos

# Optional network/proxy
# http_proxy =
# use_curl_exec =

# tarball versioning (if TermuxDocker builds from tarballs)
# tarball_release = 1.0.0
# tarball =
